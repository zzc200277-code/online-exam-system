<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>用户状态管理</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<header class="topbar">
    <a class="brand" th:href="@{/}">
        <span class="brand-mark">管</span>
        <span>智慧校园数据中心</span>
    </a>
    <nav class="nav">
        <a th:href="@{/}">首页</a>
        <a th:href="@{/getUserById}">学生档案</a>
        <a th:href="@{/getScoreByUserId}">成绩分析</a>
        <a th:href="@{/updatepassword}">安全中心</a>
    </nav>
</header>

<main class="page">
    <section class="panel">
        <div class="panel-head">
            <div>
                <p class="eyebrow">USER OPERATIONS</p>
                <h1>用户状态管理</h1>
                <p class="subtext">支持按账号状态分页查询，也可以通过邮箱精确定位用户。</p>
            </div>
            <span class="badge ok" th:if="${totalUsers != null}" th:text="'共 ' + ${totalUsers} + ' 人'">共 0 人</span>
        </div>

        <div class="split">
            <form class="panel" style="box-shadow:none; margin-top:0;" th:action="@{/getUserByStatus}" method="get">
                <h3>按状态筛选</h3>
                <p class="subtext">1 表示正常，0 表示待审核，2 表示异常。</p>
                <label for="status">账号状态</label>
                <select id="status" name="status">
                    <option value="1" th:selected="${status == 1}">正常用户</option>
                    <option value="0" th:selected="${status == 0}">待审核用户</option>
                    <option value="2" th:selected="${status == 2}">异常用户</option>
                </select>
                <button type="submit" style="margin-top:12px;">查询列表</button>
            </form>

            <form class="panel" style="box-shadow:none; margin-top:0;" th:action="@{/getUserByMail}" method="get">
                <h3>邮箱精确查询</h3>
                <p class="subtext">输入邮箱查看单个用户档案。</p>
                <label for="mail">邮箱</label>
                <input id="mail" type="email" name="mail" placeholder="aa@example.com" required>
                <button type="submit" style="margin-top:12px;">查询用户</button>
            </form>
        </div>
        <p class="msg" th:if="${msg}" th:text="${msg}"></p>
    </section>

    <section class="panel" th:if="${user != null}">
        <div class="panel-head">
            <div>
                <p class="eyebrow">MATCHED USER</p>
                <h2 th:text="${user.nickname} ?: '用户详情'">用户详情</h2>
            </div>
            <span class="badge"
                  th:classappend="${user.status == 1} ? ' ok' : (${user.status == 0} ? ' warn' : ' bad')"
                  th:text="${user.status == 1} ? '正常' : (${user.status == 0} ? '待审核' : '异常')">状态</span>
        </div>
        <dl class="profile">
            <dt>用户 ID</dt><dd th:text="${user.id}"></dd>
            <dt>用户名</dt><dd th:text="${user.username}"></dd>
            <dt>昵称</dt><dd th:text="${user.nickname}"></dd>
            <dt>邮箱</dt><dd th:text="${user.mail}"></dd>
            <dt>状态</dt><dd th:text="${user.status}"></dd>
            <dt>学号</dt><dd th:text="${user.userid}"></dd>
        </dl>
    </section>

    <section class="panel" th:if="${users != null and !users.isEmpty()}">
        <div class="panel-head">
            <div>
                <p class="eyebrow">USER LIST</p>
                <h2>用户列表</h2>
            </div>
            <input id="tableFilter" type="search" placeholder="搜索用户名 / 邮箱 / 学号" oninput="filterTable()">
        </div>
        <div class="table-wrap">
            <table id="userTable">
                <thead>
                <tr>
                    <th>用户 ID</th>
                    <th>用户名</th>
                    <th>昵称</th>
                    <th>邮箱</th>
                    <th>状态</th>
                    <th>学号</th>
                    <th>操作</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="item : ${users}">
                    <td th:text="${item.id}"></td>
                    <td th:text="${item.username}"></td>
                    <td th:text="${item.nickname}"></td>
                    <td th:text="${item.mail}"></td>
                    <td>
                        <span class="badge"
                              th:classappend="${item.status == 1} ? ' ok' : (${item.status == 0} ? ' warn' : ' bad')"
                              th:text="${item.status == 1} ? '正常' : (${item.status == 0} ? '待审核' : '异常')">状态</span>
                    </td>
                    <td th:text="${item.userid}"></td>
                    <td><a class="btn secondary" th:href="@{/getScoreByUserId(userid=${item.userid})}">成绩</a></td>
                </tr>
                </tbody>
            </table>
        </div>

        <div class="pagination">
            <a class="btn secondary" th:classappend="${currentPage <= 1} ? ' disabled'"
               th:href="@{/getUserByStatus(status=${status}, page=${currentPage - 1})}">上一页</a>
            <span>第 <strong th:text="${currentPage}"></strong> / <strong th:text="${totalPages}"></strong> 页</span>
            <a class="btn secondary" th:classappend="${currentPage >= totalPages} ? ' disabled'"
               th:href="@{/getUserByStatus(status=${status}, page=${currentPage + 1})}">下一页</a>
        </div>
    </section>
</main>

<script>
    function filterTable() {
        const keyword = document.getElementById('tableFilter').value.trim().toLowerCase();
        document.querySelectorAll('#userTable tbody tr').forEach(row => {
            row.style.display = row.innerText.toLowerCase().includes(keyword) ? '' : 'none';
        });
    }
</script>
</body>
</html>
