<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>考生列表</title>
    <style>
        body { margin: 0; font-family: "Microsoft YaHei", Arial, sans-serif; background: #f5f7fb; color: #1f2937; }
        main { max-width: 920px; margin: 36px auto; padding: 0 20px; }
        a { color: #1d4ed8; text-decoration: none; }
        .box { background: #fff; border: 1px solid #dbe3ef; border-radius: 8px; padding: 24px; margin-top: 16px; }
        form { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 14px; }
        input { min-width: 180px; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; }
        button { padding: 10px 18px; border: 0; border-radius: 6px; background: #1d4ed8; color: #fff; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 16px; }
        th, td { border-bottom: 1px solid #e2e8f0; padding: 10px; text-align: left; }
        th { color: #475569; background: #f8fafc; }
        .msg { color: #b91c1c; }
        .pagination { margin-top: 18px; display: flex; gap: 14px; align-items: center; }
        .disabled { color: #94a3b8; pointer-events: none; }
        dl { display: grid; grid-template-columns: 110px 1fr; gap: 10px; }
        dt { color: #64748b; }
        dd { margin: 0; }
    </style>
</head>
<body>
<main>
    <a th:href="@{/}">返回首页</a>
    <section class="box">
        <h2>按状态查询考生</h2>
        <form th:action="@{/getUserByStatus}" method="get">
            <input type="number" name="status" th:value="${status}" placeholder="状态，例如 1" required>
            <button type="submit">查询</button>
        </form>
        <h2>按邮箱查询考生</h2>
        <form th:action="@{/getUserByMail}" method="get">
            <input type="email" name="mail" placeholder="请输入邮箱">
            <button type="submit">查询</button>
        </form>

        <p class="msg" th:if="${msg}" th:text="${msg}"></p>

        <dl th:if="${user != null}">
            <dt>考生 ID</dt><dd th:text="${user.id}"></dd>
            <dt>用户名</dt><dd th:text="${user.username}"></dd>
            <dt>姓名</dt><dd th:text="${user.nickname}"></dd>
            <dt>邮箱</dt><dd th:text="${user.mail}"></dd>
            <dt>账号状态</dt><dd th:text="${user.status}"></dd>
            <dt>准考证号</dt><dd th:text="${user.userid}"></dd>
        </dl>

        <table th:if="${users != null and !users.isEmpty()}">
            <thead>
            <tr>
                <th>考生 ID</th>
                <th>用户名</th>
                <th>姓名</th>
                <th>邮箱</th>
                <th>状态</th>
                <th>准考证号</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="item : ${users}">
                <td th:text="${item.id}"></td>
                <td th:text="${item.username}"></td>
                <td th:text="${item.nickname}"></td>
                <td th:text="${item.mail}"></td>
                <td th:text="${item.status}"></td>
                <td th:text="${item.userid}"></td>
            </tr>
            </tbody>
        </table>

        <div class="pagination" th:if="${users != null}">
            <a th:classappend="${currentPage <= 1} ? 'disabled'"
               th:href="@{/getUserByStatus(status=${status}, page=${currentPage - 1})}">上一页</a>
            <span>第 <span th:text="${currentPage}"></span> / <span th:text="${totalPages}"></span> 页</span>
            <a th:classappend="${currentPage >= totalPages} ? 'disabled'"
               th:href="@{/getUserByStatus(status=${status}, page=${currentPage + 1})}">下一页</a>
        </div>
    </section>
</main>
</body>
</html>
