<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>修改密码</title>
    <style>
        body { margin: 0; font-family: "Microsoft YaHei", Arial, sans-serif; background: #f5f7fb; color: #1f2937; }
        main { max-width: 520px; margin: 36px auto; padding: 0 20px; }
        a { color: #1d4ed8; text-decoration: none; }
        .box { background: #fff; border: 1px solid #dbe3ef; border-radius: 8px; padding: 24px; margin-top: 16px; }
        label { display: block; margin: 12px 0 6px; color: #475569; }
        input { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; }
        button { width: 100%; margin-top: 18px; padding: 10px; border: 0; border-radius: 6px; background: #1d4ed8; color: #fff; cursor: pointer; }
        .msg { color: #b91c1c; }
    </style>
</head>
<body>
<main>
    <a th:href="@{/}">返回首页</a>
    <section class="box">
        <h2>修改密码</h2>
        <form th:action="@{/updatepassword}" method="post">
            <label>用户名</label>
            <input name="username" required>
            <label>原密码</label>
            <input name="oldpassword" type="password" required>
            <label>新密码</label>
            <input name="newpassword" type="password" required>
            <button type="submit">保存新密码</button>
        </form>
        <p class="msg" th:if="${msg}" th:text="${msg}"></p>
    </section>
</main>
</body>
</html>
