<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>账号安全中心</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<header class="topbar">
    <a class="brand" th:href="@{/}">
        <span class="brand-mark">安</span>
        <span>智慧校园数据中心</span>
    </a>
    <nav class="nav">
        <a th:href="@{/}">首页</a>
        <a th:href="@{/getUserById}">学生档案</a>
        <a th:href="@{/getUserByStatus}">用户管理</a>
        <a th:href="@{/getScoreByUserId}">成绩分析</a>
    </nav>
</header>

<main class="page">
    <section class="split">
        <div class="panel">
            <p class="eyebrow">SECURITY CENTER</p>
            <h1>账号安全中心</h1>
            <p class="subtext">通过用户名、原密码和新密码完成密码更新，形成完整的用户账号维护流程。</p>
            <form class="form-grid" th:action="@{/updatepassword}" method="post">
                <div>
                    <label for="username">用户名</label>
                    <input id="username" name="username" placeholder="请输入用户名" required>
                </div>
                <div>
                    <label for="oldpassword">原密码</label>
                    <input id="oldpassword" name="oldpassword" type="password" required>
                </div>
                <div>
                    <label for="newpassword">新密码</label>
                    <input id="newpassword" name="newpassword" type="password" minlength="3" required>
                </div>
                <button type="submit">保存新密码</button>
            </form>
            <p class="msg" th:if="${msg}" th:text="${msg}"></p>
        </div>
        <aside class="panel">
            <p class="eyebrow">QUALITY POINTS</p>
            <h2>答辩可讲亮点</h2>
            <ul class="insight-list">
                <li><strong>完整账号流程：</strong>注册、登录、退出、修改密码形成闭环。</li>
                <li><strong>服务层校验：</strong>登录与注册逻辑集中在 Service，结构清晰。</li>
                <li><strong>安全体验：</strong>修改密码会校验原密码，避免直接覆盖。</li>
            </ul>
        </aside>
    </section>
</main>
</body>
</html>
