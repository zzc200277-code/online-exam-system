<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>学生档案检索</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<header class="topbar">
    <a class="brand" th:href="@{/}">
        <span class="brand-mark">档</span>
        <span>智慧校园数据中心</span>
    </a>
    <nav class="nav">
        <a th:href="@{/}">首页</a>
        <a th:href="@{/getUserByStatus}">用户管理</a>
        <a th:href="@{/getScoreByUserId}">成绩分析</a>
        <a th:href="@{/updatepassword}">安全中心</a>
    </nav>
</header>

<main class="page">
    <section class="panel">
        <div class="panel-head">
            <div>
                <p class="eyebrow">STUDENT PROFILE</p>
                <h1>学生档案检索</h1>
                <p class="subtext">通过用户 ID 快速查询账号、昵称、邮箱、状态和学号信息。</p>
            </div>
        </div>
        <form class="search-form" th:action="@{/getUserById}" method="get">
            <div>
                <label for="id">用户 ID</label>
                <input id="id" type="number" name="id" placeholder="请输入用户 ID，例如：1" required>
            </div>
            <button type="submit">查询档案</button>
        </form>
        <p class="msg" th:if="${msg}" th:text="${msg}"></p>
    </section>

    <section class="panel" th:if="${user != null}">
        <div class="panel-head">
            <div>
                <p class="eyebrow">PROFILE CARD</p>
                <h2 th:text="${user.nickname} ?: '学生档案'">学生档案</h2>
            </div>
            <span class="badge"
                  th:classappend="${user.status == 1} ? ' ok' : (${user.status == 0} ? ' warn' : ' bad')"
                  th:text="${user.status == 1} ? '正常' : (${user.status == 0} ? '待审核' : '异常')">状态</span>
        </div>
        <dl class="profile">
            <dt>用户 ID</dt><dd th:text="${user.id}"></dd>
            <dt>用户名</dt><dd th:text="${user.username}"></dd>
            <dt>昵称</dt><dd th:text="${user.nickname}"></dd>
            <dt>邮箱</dt><dd th:text="${user.mail}"></dd>
            <dt>手机号</dt><dd th:text="${user.phone} ?: '未填写'"></dd>
            <dt>账号状态</dt><dd th:text="${user.status}"></dd>
            <dt>学号</dt><dd th:text="${user.userid}"></dd>
            <dt>创建时间</dt><dd th:text="${user.createTime != null ? #temporals.format(user.createTime, 'yyyy-MM-dd HH:mm') : '暂无'}"></dd>
        </dl>
        <div class="actions" style="margin-top: 18px;">
            <a class="btn" th:href="@{/getScoreByUserId(userid=${user.userid})}">查看该学生成绩</a>
            <a class="btn secondary" th:href="@{/getUserByStatus(status=${user.status})}">查看同状态用户</a>
        </div>
    </section>
</main>
</body>
</html>
