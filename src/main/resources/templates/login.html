<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>在线考试系统 - 登录</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; min-height: 100vh; font-family: "Microsoft YaHei", Arial, sans-serif; background: #eef4ff; display: grid; place-items: center; color: #1f2937; }
        .panel { width: min(420px, calc(100vw - 32px)); background: #fff; border: 1px solid #dbe3ef; border-radius: 8px; padding: 28px; }
        h1 { margin: 0 0 18px; text-align: center; font-size: 24px; }
        .tabs { display: flex; gap: 8px; margin-bottom: 20px; }
        .tabs button { flex: 1; border: 1px solid #cbd5e1; background: #f8fafc; padding: 10px; border-radius: 6px; cursor: pointer; font-size: 15px; }
        .tabs button.active { background: #1d4ed8; color: #fff; border-color: #1d4ed8; }
        form { display: none; }
        form.active { display: block; }
        label { display: block; margin: 12px 0 6px; font-size: 14px; color: #475569; }
        input { width: 100%; padding: 10px 12px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 15px; }
        .submit { width: 100%; margin-top: 18px; border: 0; background: #1d4ed8; color: #fff; padding: 11px; border-radius: 6px; font-size: 15px; cursor: pointer; }
        .msg { color: #b91c1c; min-height: 22px; margin: 0 0 10px; text-align: center; }
        .back { display: block; text-align: center; margin-top: 16px; color: #1d4ed8; text-decoration: none; }
    </style>
</head>
<body>
<div class="panel">
    <h1>在线考试系统</h1>
    <p class="msg" th:if="${msg}" th:text="${msg}"></p>
    <div class="tabs">
        <button id="loginTab" type="button" onclick="switchTab('login')">考生登录</button>
        <button id="registerTab" type="button" onclick="switchTab('register')">考生注册</button>
    </div>

    <form id="loginForm" th:action="@{/login}" method="post">
        <label>用户名</label>
        <input name="username" autocomplete="username" required>
        <label>密码</label>
        <input name="password" type="password" autocomplete="current-password" required>
        <button class="submit" type="submit">登录</button>
    </form>

    <form id="registerForm" th:action="@{/register}" method="post">
        <label>用户名</label>
        <input name="username" autocomplete="username" required>
        <label>姓名</label>
        <input name="nickname" required>
        <label>邮箱</label>
        <input name="mail" type="email">
        <label>准考证号</label>
        <input name="userid" type="number" placeholder="例如 100">
        <label>密码</label>
        <input name="password" type="password" autocomplete="new-password" required>
        <label>确认密码</label>
        <input name="confirmPassword" type="password" autocomplete="new-password" required>
        <button class="submit" type="submit">注册</button>
    </form>
    <a class="back" th:href="@{/}">返回首页</a>
</div>
<script th:inline="javascript">
    const initialTab = /*[[${activeTab ?: 'login'}]]*/ 'login';
    function switchTab(tab) {
        document.getElementById('loginForm').classList.toggle('active', tab === 'login');
        document.getElementById('registerForm').classList.toggle('active', tab === 'register');
        document.getElementById('loginTab').classList.toggle('active', tab === 'login');
        document.getElementById('registerTab').classList.toggle('active', tab === 'register');
    }
    switchTab(initialTab);
</script>
</body>
</html>
