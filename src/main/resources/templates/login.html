<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>登录 / 注册</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<main class="auth-page">
    <section class="auth-panel">
        <p class="eyebrow">ACCOUNT CENTER</p>
        <h1 style="font-size: 34px;">账号中心</h1>
        <p class="subtext">登录后可以进入智慧校园数据中心，体验学生档案检索与成绩智能分析。</p>
        <p class="msg" th:if="${msg}" th:text="${msg}"></p>

        <div class="tabs">
            <button id="loginTab" type="button" onclick="switchTab('login')">登录</button>
            <button id="registerTab" type="button" onclick="switchTab('register')">注册</button>
        </div>

        <form id="loginForm" th:action="@{/login}" method="post">
            <div>
                <label for="loginUsername">用户名</label>
                <input id="loginUsername" name="username" autocomplete="username" placeholder="例如：aa" required>
            </div>
            <div>
                <label for="loginPassword">密码</label>
                <input id="loginPassword" name="password" type="password" autocomplete="current-password" placeholder="例如：123" required>
            </div>
            <button type="submit">登录系统</button>
        </form>

        <form id="registerForm" th:action="@{/register}" method="post">
            <div>
                <label for="registerUsername">用户名</label>
                <input id="registerUsername" name="username" autocomplete="username" required>
            </div>
            <div>
                <label for="nickname">昵称</label>
                <input id="nickname" name="nickname">
            </div>
            <div>
                <label for="mail">邮箱</label>
                <input id="mail" name="mail" type="email">
            </div>
            <div>
                <label for="userid">学号</label>
                <input id="userid" name="userid" type="number">
            </div>
            <div>
                <label for="registerPassword">密码</label>
                <input id="registerPassword" name="password" type="password" autocomplete="new-password" required>
            </div>
            <div>
                <label for="confirmPassword">确认密码</label>
                <input id="confirmPassword" name="confirmPassword" type="password" autocomplete="new-password" required>
            </div>
            <button type="submit">创建账号</button>
        </form>

        <div class="actions" style="margin-top: 18px;">
            <a class="btn secondary" th:href="@{/}">返回首页</a>
        </div>
    </section>
</main>
<script th:inline="javascript">
    const initialTab = /*[[${activeTab ?: 'login'}]]*/ 'login';
    function switchTab(tab) {
        document.getElementById('loginForm').classList.toggle('active', tab === 'login');
        document.getElementById('registerForm').classList.toggle('active', tab === 'register');
        document.getElementById('loginTab').classList.toggle('active', tab === 'login');
        document.getElementById('registerTab').classList.toggle('active', tab === 'register');
    }
    switchTab(initialTab);
</script>
</body>
</html>
